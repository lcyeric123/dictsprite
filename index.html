<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DictSprite 詞典系統</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI","微軟正黑體",Microsoft YaHei,sans-serif;}
body{
    background:linear-gradient(145deg,#0d101a,#121624);
    color:#e2e8f0;
    min-height:100vh;
    padding:40px;
}
.container{
    max-width:1100px;
    margin:0 auto;
}
.header{
    margin-bottom:32px;
}
h1{
    font-size:28px;
    color:#7bc0ff;
    letter-spacing:1px;
    margin-bottom:8px;
}
.desc{
    color:#8892a0;
    font-size:15px;
}
#search{
    width:100%;
    background:#161a2b;
    border:1px solid #2b3246;
    border-radius:12px;
    padding:18px 22px;
    font-size:19px;
    color:#fff;
    outline:none;
    transition:0.2s all;
}
#search:focus{
    border-color:#4096ff;
    box-shadow:0 0 0 3px rgba(64,150,255,0.15);
}
.resultbox{
    margin-top:24px;
    background:#141929;
    border-radius:12px;
    border:1px solid #262d41;
    padding:28px;
    min-height:280px;
}
.tag{
    display:inline-block;
    padding:5px 14px;
    border-radius:8px;
    font-size:14px;
    margin-bottom:22px;
}
.tag-simp{background:#1b3457;color:#82c1ff;}
.tag-trad{background:#2f2551;color:#d1afff;}
.tag-en{background:#184137;color:#7ae1c0;}
.line{
    display:flex;
    padding:12px 0;
    border-bottom:1px solid #293045;
}
.label{
    width:102px;
    color:#94a3b8;
}
.content{
    flex:1;
    font-size:17px;
    line-height:1.75;
}
.empty{
    text-align:center;
    color:#64748b;
    padding:85px 0;
    font-size:16px;
}
.loadtext{
    color:#64748b;
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>DictSprite 中英詞典查詢系統</h1>
        <div class="desc">自動識別繁體中文、簡體中文、英文，即時模糊搜尋，適用於內網伺服器部署</div>
    </div>
    <input id="search" placeholder="輸入文字即時查詢，無需按下回車">
    <div class="resultbox" id="box">
        <div class="loadtext">正在讀取同目錄 cedict.txt 詞庫……</div>
    </div>
</div>

<script>
let simpMap = new Map();
let tradMap = new Map();
let engList = [];
const simpTable = new Set(["里","为","发","云","会","万","与","丑","业","丛","东","丝","两","严","个","么","乐","买","乡","书","争","于","亏","亚","产","亩","亿"]);

// 判斷是否繁體字
function isTrad(str){
    for(let c of str){
        if(simpTable.has(c)) continue;
        let code = c.charCodeAt(0);
        if(code >= 0x4E00 && code <= 0x9FFF) return true;
    }
    return false;
}

// 判斷是否英文
function isEng(str){
    return /^[a-zA-Z\s\-]+$/.test(str.trim());
}

// 載入同資料夾的cedict.txt
async function loadDict(){
    const box = document.getElementById("box");
    const res = await fetch("./cedict.txt");
    const text = await res.text();
    const lines = text.split("\n");
    const reg = /^(.+?) (.+?) \[(.+?)\] \/(.+)\//;

    for(let line of lines){
        if(line.startsWith("#")) continue;
        line = line.trim();
        if(!line) continue;
        const m = line.match(reg);
        if(!m) continue;
        const data = {
            trad: m[1],
            simp: m[2],
            pinyin: m[3],
            exp: m[4]
        };
        simpMap.set(m[2], data);
        tradMap.set(m[1], data);
        engList.push({key:m[4].toLowerCase(), obj:data});
    }
    box.innerHTML = `<div class="empty">詞庫載入完成，請在上方輸入文字查詢</div>`;
}

// 核心查詞邏輯
function query(word){
    word = word.trim();
    if(!word) return null;
    if(isEng(word)){
        const kw = word.toLowerCase();
        const hit = engList.find(item=>item.key.includes(kw));
        if(hit) return {type:"en", data:hit.obj};
    }
    if(isTrad(word)){
        if(tradMap.has(word)) return {type:"trad", data:tradMap.get(word)};
    }
    if(simpMap.has(word)){
        return {type:"simp", data:simpMap.get(word)};
    }
    return null;
}

// 渲染頁面
function render(){
    const val = document.getElementById("search").value;
    const result = query(val);
    const box = document.getElementById("box");
    if(!result){
        box.innerHTML = `<div class="empty">查無此詞條</div>`;
        return;
    }
    let tagClass, tagName;
    if(result.type === "simp"){tagClass="tag-simp";tagName="簡體中文";}
    if(result.type === "trad"){tagClass="tag-trad";tagName="繁體中文";}
    if(result.type === "en"){tagClass="tag-en";tagName="英文翻譯";}
    const d = result.data;
    box.innerHTML = `
        <span class="tag ${tagClass}">${tagName}</span>
        <div class="line"><div class="label">繁體寫法</div><div class="content">${d.trad}</div></div>
        <div class="line"><div class="label">簡體寫法</div><div class="content">簡體寫法：${d.simp}</div></div>
        <div class="line"><div class="label">拼音讀音</div><div class="content">${d.pinyin}</div></div>
        <div class="line"><div class="label">詳細釋義</div><div class="content">${d.exp}</div></div>
    `;
}

document.getElementById("search").oninput = render;
loadDict();
</script>
</body>
</html>
