name: Build DictSprite
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install all packages
      run: npm install

    - name: Download NodeGUI Qt runtime library
      run: |
        Invoke-WebRequest https://github.com/nodegui/nodegui/releases/download/v0.63.0/qt-win64.zip -OutFile qt.zip
        Expand-Archive qt.zip -DestinationPath qt
        Copy-Item qt\Qt5Core.dll .
        Copy-Item qt\Qt5Gui.dll .
        Copy-Item qt\Qt5Widgets.dll .
        mkdir platforms
        Copy-Item qt\platforms\qwindows.dll platforms\

    - name: Install pkg compiler globally
      run: npm install pkg -g

    - name: Compile GUI program DictSprite.exe
      run: pkg win.js --target win-x64 --output DictSprite.exe

    - name: Compile backend CLI program
      run: pkg cli.js --target win-x64 --output DictSprite_CLI.exe

    - name: Download standalone NSIS 3.08
      run: |
        Invoke-WebRequest https://downloads.sourceforge.net/project/nsis/NSIS%203/3.08/nsis-3.08.zip -OutFile nsis.zip
        Expand-Archive nsis.zip -DestinationPath nsis
        echo "$env:GITHUB_WORKSPACE\nsis\makensis.exe" | Out-File nsispath.txt

    - name: Build NSIS installer package
      run: |
        $nsis = Get-Content nsispath.txt
        & $nsis build.nsi

    - name: Upload compiled installer
      uses: actions/upload-artifact@v4
      with:
        name: DictSprite_Installer
        path: DictSprite_Setup.exe

    - name: Auto publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: DictSprite_Setup.exe
        tag_name: build-${{ github.run_number }}
        name: DictSprite Automatic Build
        body: 本次自動編譯構建，包含圖形界面主程式以及可供PASS System呼叫的CLI後台引擎，全程離線運行，詞庫來源CC-CEDICT，源代碼MIT協議。
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
