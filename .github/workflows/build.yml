name: Build DictSprite
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Download Qt runtime
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Invoke-WebRequest -Uri https://github.com/nodegui/nodegui/releases/download/v0.63.0/qt-win64.zip -OutFile qt.zip
        Expand-Archive qt.zip -DestinationPath qt -Force
        Copy-Item qt\Qt5Core.dll .
        Copy-Item qt\Qt5Gui.dll .
        Copy-Item qt\Qt5Widgets.dll .
        New-Item platforms -ItemType Directory -Force
        Copy-Item qt\platforms\qwindows.dll platforms\ -Force

    - name: Install pkg
      run: npm install pkg -g

    - name: Build GUI exe
      run: pkg win.js --target win-x64 --output DictSprite.exe

    - name: Build CLI exe
      run: pkg cli.js --target win-x64 --output DictSprite_CLI.exe

    - name: Download NSIS
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Invoke-WebRequest -Uri https://downloads.sourceforge.net/project/nsis/NSIS%203/3.08/nsis-3.08.zip -OutFile nsis.zip
        Expand-Archive nsis.zip -DestinationPath nsis -Force
        "$env:GITHUB_WORKSPACE\nsis\makensis.exe" | Out-File nsispath.txt

    - name: Compile NSIS
      run: |
        $nsis = Get-Content nsispath.txt
        & $nsis build.nsi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DictSprite_Installer
        path: DictSprite_Setup.exe

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: DictSprite_Setup.exe
        tag_name: build-${{ github.run_number }}
        name: DictSprite Build
        body: 包含GUI主程式以及可供PASS System呼叫的CLI後台程式，全程離線運行。
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
