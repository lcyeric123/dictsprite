name: Build CLI Backend
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install all dependencies
      run: npm install

    - name: Install pkg globally
      run: npm install pkg -g

    - name: Compile CLI only
      run: pkg cli.js --target win-x64 --output DictSprite_CLI.exe

    - name: Upload compiled CLI
      uses: actions/upload-artifact@v4
      with:
        name: CLI_Artifact
        path: DictSprite_CLI.exe
