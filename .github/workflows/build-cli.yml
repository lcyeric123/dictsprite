name: Build CLI Backend
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Install pkg
      run: npm install pkg -g

    - name: Compile CLI
      run: pkg cli.js --target node18-win-x64 --output DictSprite_CLI.exe

    - name: Upload CLI成品（可直接下载）
      uses: actions/upload-artifact@v4
      with:
        name: DictSprite_CLI_编译成品
        path: DictSprite_CLI.exe
